owner: MoltyCel
repo: status.moltrust.ch

sites:
  - name: MoltGuard Health
    url: https://api.moltrust.ch/guard/health
  - name: MoltGuard API Info
    url: https://api.moltrust.ch/guard/api/info
  - name: Agent Score (Free)
    url: https://api.moltrust.ch/guard/api/agent/score-free/0x0000000000000000000000000000000000000001
  - name: Skill Info
    url: https://api.moltrust.ch/guard/skill/info
  - name: Shopping Info
    url: https://api.moltrust.ch/guard/shopping/info
  - name: MolTrust Homepage
    url: https://moltrust.ch

status-website:
  cname: status.moltrust.ch
  logoUrl: https://raw.githubusercontent.com/MoltyCel/status.moltrust.ch/master/assets/logo.png
  name: MolTrust Status
  introTitle: "**MolTrust** — System Status"
  introMessage: Real-time uptime and latency data for MolTrust infrastructure. Monitored every 5 minutes via [Upptime](https://upptime.js.org).
  themeUrl: https://raw.githubusercontent.com/MoltyCel/status.moltrust.ch/master/assets/moltrust-theme.css
  css: |
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
    body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; }
    nav { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); height: 60px; }
    nav .logo img { height: 32px; width: auto; border-radius: 8px; object-fit: contain; }
    nav .logo div { font-weight: 700; font-size: 1.15rem; letter-spacing: -0.02em; }
    nav ul a { font-size: 0.82rem; font-weight: 500; letter-spacing: 0.02em; }
    nav ul a:hover { color: #E85D26 !important; }
    h1 strong { color: #E85D26; }
    h2 { font-weight: 600; }
    .lead { color: #475569; }
    article { border-radius: 10px; }
    footer a { color: #E85D26; }
    footer a:hover { text-decoration: underline; }
  navbar:
    - title: Status
      href: /
    - title: MolTrust
      href: https://moltrust.ch
    - title: API
      href: https://api.moltrust.ch/guard/api/info
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
